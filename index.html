<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Era Dominion Reborn v4 - Style Overhaul</title>
<style>
:root{--bg:#071018;--panel:rgba(8,12,20,.72);--line:rgba(255,255,255,.16);--txt:#f7fbff;--muted:#a9b8cf;--gold:#ffd875;--red:#ff6074;--blue:#78b9ff}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03060a;color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;display:block;background:#071018}.screen{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at 50% 28%,rgba(51,73,116,.68),rgba(4,7,12,.96) 62%)}.hidden{display:none!important}.card{width:min(860px,94vw);padding:34px 28px;border-radius:30px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,28,46,.92),rgba(7,11,19,.88));box-shadow:0 30px 100px rgba(0,0,0,.6);text-align:center;backdrop-filter:blur(16px)}h1{margin:0 0 12px;font-size:clamp(40px,7vw,82px);line-height:.9;letter-spacing:-.07em;text-shadow:0 10px 30px rgba(0,0,0,.55)}p{margin:0}.subtitle{margin:0 auto 24px;max-width:700px;color:var(--muted);font-size:clamp(14px,2vw,18px);line-height:1.65}.row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.btn{border:0;border-radius:18px;padding:16px 24px;font-weight:950;font-size:18px;cursor:pointer;color:#121927;background:linear-gradient(180deg,#fff5b7,#ffc852);box-shadow:0 14px 34px rgba(255,198,82,.22),inset 0 1px 0 rgba(255,255,255,.7)}.btn.secondary{color:#eef6ff;background:linear-gradient(180deg,#34445f,#1d2738)}.btn:active{transform:translateY(1px)}#hud{position:fixed;left:14px;right:14px;top:12px;z-index:10;display:none;justify-content:space-between;gap:10px;pointer-events:none}.pill{border:1px solid var(--line);border-radius:18px;padding:10px 13px;background:var(--panel);box-shadow:0 12px 34px rgba(0,0,0,.28);backdrop-filter:blur(12px)}.title{font-weight:950;color:var(--gold)}.stats{display:flex;gap:9px;flex-wrap:wrap}.stat{font-size:13px;color:var(--muted)}.stat b{color:white;font-size:16px}#rank{max-width:min(390px,46vw);font-size:13px;color:var(--muted);line-height:1.55}#rank b{color:white}#pauseBtn{position:fixed;right:14px;bottom:14px;z-index:11;display:none}.kbd{display:inline-block;border:1px solid rgba(255,255,255,.24);border-bottom-color:rgba(255,255,255,.42);border-radius:7px;padding:2px 7px;background:rgba(255,255,255,.08);color:#fff;font-weight:900}.small{margin-top:16px;color:var(--muted);font-size:13px;line-height:1.65}#joy{position:fixed;left:18px;bottom:18px;width:142px;height:142px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(8,12,20,.32);z-index:11;display:none;touch-action:none}.knob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px;border-radius:50%;background:rgba(255,255,255,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}@media(max-width:760px){#joy{display:block}.btn{width:100%}#rank{display:none}.stats{max-width:68vw}.card{padding:26px 18px}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="menu" class="screen"><div class="card"><h1>ERA DOMINION</h1><p class="subtitle">절차형 3D 대신, 단일 HTML에서 더 보기 좋은 고해상도 2.5D 일러스트 스타일로 새로 갈아엎은 버전입니다. 리더는 단계별 실루엣과 장비가 크게 바뀝니다.</p><div class="row"><button id="start" class="btn">게임 시작</button><button id="how" class="btn secondary">조작 보기</button></div><p class="small">이동: <span class="kbd">WASD</span> 또는 방향키 · 일시정지: <span class="kbd">Esc</span> / <span class="kbd">P</span></p></div></div>
<div id="help" class="screen hidden"><div class="card"><h1 style="font-size:44px">조작 안내</h1><p class="subtitle">작은 시민 NPC를 흡수해 점수와 세력을 키우세요. 적 리더도 NPC를 흡수하며 성장합니다. 강한 적에게 닿으면 게임오버입니다.</p><div class="row"><button id="back" class="btn">돌아가기</button></div></div></div>
<div id="pause" class="screen hidden"><div class="card"><h1 style="font-size:48px">일시정지</h1><p class="subtitle">계속하거나 처음부터 다시 시작할 수 있습니다.</p><div class="row"><button id="resume" class="btn">계속하기</button><button id="restart" class="btn secondary">다시하기</button></div></div></div>
<div id="over" class="screen hidden"><div class="card"><h1 style="font-size:48px" id="overTitle">게임 오버</h1><p class="subtitle" id="overText"></p><div class="row"><button id="again" class="btn">다시하기</button></div></div></div>
<div id="hud"><div class="pill"><div class="title" id="stageName">시민 리더</div><div class="stats"><span class="stat">점수 <b id="score">0</b></span><span class="stat">세력 <b id="power">1</b></span><span class="stat">단계 <b id="stage">1</b>/6</span><span class="stat">NPC <b id="npcCount">0</b></span><span class="stat">적 리더 <b id="enemyCount">5</b></span></div></div><div id="rank" class="pill"></div></div>
<button id="pauseBtn" class="btn secondary">일시정지</button><div id="joy"><div id="knob" class="knob"></div></div>
<script>
const canvas=document.getElementById('cv'),ctx=canvas.getContext('2d');let W=innerWidth,H=innerHeight,DPR=1;function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const $=id=>document.getElementById(id);const stageNames=['시민 리더','도시 대장','구역 지배자','도시 군주','도시의 왕','도시의 황제'];const stageScore=[0,90,220,430,720,1080];const stagePalette=['#67d1ff','#74e58b','#f4b75b','#c77dff','#ffd76a','#ff5d6f'];let state='menu',keys={},joy={x:0,y:0},cam={x:0,y:0},player,units=[],buildings=[],props=[],particles=[],last=0,spawnT=0,world=150;
function R(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function iso(x,y){return{x:(x-cam.x)*1.08+W/2,y:(y-cam.y)*.66+H/2}}
function makeUnit(type,name,stage,x,y,power){const u={type,name,stage,score:stageScore[stage]||0,power,alive:true,x,y,vx:0,vy:0,dir:R(0,6.28),ai:0,hit:0};units.push(u);return u}
function reset(){units=[];buildings=[];props=[];particles=[];cam={x:0,y:0};player=makeUnit('player','미현 리더',0,0,0,1);for(let i=0;i<155;i++)makeUnit('npc','시민',0,R(-world,world),R(-world,world),R(.35,.8));['아르칸','벨라스','카이론','네메아','드라코'].forEach((n,i)=>makeUnit('enemy',n,i%2,R(-world,world),R(-world,world),1.4+i*.55));for(let i=0;i<54;i++)buildings.push({x:R(-world,world),y:R(-world,world),w:R(8,15),h:R(8,15),z:R(10,32),c:Math.random()>.45?'#2b3548':'#39445a'});for(let i=0;i<180;i++)props.push({x:R(-world*1.15,world*1.15),y:R(-world*1.15,world*1.15),s:R(.6,1.4),t:Math.random()>.18?'tree':'rock'});last=performance.now();spawnT=0;state='playing';$('menu').classList.add('hidden');$('pause').classList.add('hidden');$('over').classList.add('hidden');$('hud').style.display='flex';$('pauseBtn').style.display='block';requestAnimationFrame(loop)}
function canMove(x,y,r){if(Math.abs(x)>world*1.25||Math.abs(y)>world*1.25)return false;for(const b of buildings){const dx=Math.abs(x-b.x),dy=Math.abs(y-b.y);if(dx<b.w*.72+r&&dy<b.h*.72+r)return false}return true}
function move(u,dx,dy,dt){let l=Math.hypot(dx,dy);if(l>.02){dx/=l;dy/=l;u.dir=Math.atan2(dy,dx);const sp=(u.type==='player'?54:40)+u.stage*5;const nx=u.x+dx*sp*dt,ny=u.y+dy*sp*dt;if(canMove(nx,ny,u.type==='npc'?2.2:4.8+u.stage*.6)){u.x=nx;u.y=ny}}}
function absorb(a,b){b.alive=false;a.score+=b.type==='npc'?R(14,27):120+b.score*.48;a.power+=b.type==='npc'?.16:b.power*.55;for(let i=0;i<10;i++)particles.push({x:b.x,y:b.y,vx:R(-18,18),vy:R(-18,18),life:R(.35,.8),c:a.type==='player'?'#84d7ff':'#ff7284'});while(a.stage<5&&a.score>=stageScore[a.stage+1]){a.stage++;for(let i=0;i<42;i++)particles.push({x:a.x,y:a.y,vx:R(-38,38),vy:R(-38,38),life:R(.45,1.05),c:stagePalette[a.stage]})}}
function ai(dt){for(const u of units){if(!u.alive||u.type==='player')continue;u.ai-=dt;if(u.ai<=0){u.ai=R(.8,2.2);if(u.type==='enemy'){let targets=units.filter(t=>t.alive&&t!==u&&(t.type==='npc'||(t.type==='enemy'&&t.score<u.score*.82)||t.type==='player'));targets.sort((a,b)=>dist(u,a)-dist(u,b));if(targets[0])u.dir=Math.atan2(targets[0].y-u.y,targets[0].x-u.x)}else u.dir+=R(-1.8,1.8)}move(u,Math.cos(u.dir),Math.sin(u.dir),dt*(u.type==='npc'?.35:1))}}
function combat(){const alive=units.filter(u=>u.alive);for(const a of alive){if(!a.alive||a.type==='npc')continue;for(const b of alive){if(!b.alive||a===b)continue;const rr=(a.type==='player'||a.type==='enemy'?7+a.stage*1.1:3)+(b.type==='npc'?2.5:5+b.stage);if(dist(a,b)<rr){const ap=a.score+a.power*48+a.stage*75,bp=b.score+b.power*48+(b.stage||0)*75;if(a.type==='player'&&bp>ap*1.04)return gameOver(`${b.name}에게 패배했습니다.`,false);if(b.type==='player'&&ap>bp*1.04)return gameOver(`${a.name}에게 패배했습니다.`,false);if(ap>=bp*.88)absorb(a,b);else if(a.type==='player')return gameOver(`${b.name}에게 패배했습니다.`,false)}}}}
function gameOver(msg,win){if(state==='over')return;state='over';$('overTitle').textContent=win?'승리':'게임 오버';$('overText').textContent=msg;$('over').classList.remove('hidden');$('pauseBtn').style.display='none'}
function update(dt){let dx=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0),dy=(keys.KeyS||keys.ArrowDown?1:0)-(keys.KeyW||keys.ArrowUp?1:0);if(Math.abs(joy.x)+Math.abs(joy.y)>.05){dx=joy.x;dy=joy.y}move(player,dx,dy,dt);ai(dt);combat();spawnT+=dt;if(spawnT>4.5&&units.filter(u=>u.alive&&u.type==='npc').length<190){spawnT=0;for(let i=0;i<16;i++)makeUnit('npc','시민',0,R(-world,world),R(-world,world),R(.35,.75))}cam.x+=(player.x-cam.x)*.08;cam.y+=(player.y-cam.y)*.08;particles=particles.filter(p=>{p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;return p.life>0});if(units.filter(u=>u.alive&&u.type==='enemy').length===0&&player.stage>=5)gameOver('도시의 황제가 되었습니다.',true);hud()}
function hud(){$('stageName').textContent=stageNames[player.stage];$('score').textContent=Math.floor(player.score);$('power').textContent=player.power.toFixed(1);$('stage').textContent=player.stage+1;$('npcCount').textContent=units.filter(u=>u.alive&&u.type==='npc').length;$('enemyCount').textContent=units.filter(u=>u.alive&&u.type==='enemy').length;$('rank').innerHTML=units.filter(u=>u.alive&&u.type!=='npc').sort((a,b)=>b.score-a.score).map((u,i)=>`${i+1}. <b>${u.name}</b> ${Math.floor(u.score)}점 · ${stageNames[u.stage]}`).join('<br>')}
function draw(){ctx.clearRect(0,0,W,H);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0d1f30');g.addColorStop(.55,'#102419');g.addColorStop(1,'#071018');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);drawGround();let items=[];for(const p of props)items.push({y:p.y,obj:p,type:'prop'});for(const b of buildings)items.push({y:b.y+b.h,obj:b,type:'building'});for(const u of units)if(u.alive)items.push({y:u.y,obj:u,type:'unit'});items.sort((a,b)=>a.y-b.y);for(const it of items){if(it.type==='prop')drawProp(it.obj);else if(it.type==='building')drawBuilding(it.obj);else drawUnit(it.obj)}for(const p of particles)drawParticle(p);drawVignette()}
function drawGround(){ctx.save();ctx.globalAlpha=.36;ctx.strokeStyle='rgba(180,210,255,.10)';ctx.lineWidth=1;for(let i=-240;i<=240;i+=24){let a=iso(-240,i),b=iso(240,i);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();a=iso(i,-240);b=iso(i,240);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}ctx.restore();for(let i=-144;i<=144;i+=48){drawRoad(-220,i,220,i);drawRoad(i,-220,i,220)}}
function drawRoad(x1,y1,x2,y2){const a=iso(x1,y1),b=iso(x2,y2);ctx.save();ctx.strokeStyle='rgba(29,35,42,.88)';ctx.lineWidth=16;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=2;ctx.setLineDash([10,12]);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.restore()}
function ellipse(x,y,w,h,c,a=1){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y,w,h,0,0,6.283);ctx.fill();ctx.restore()}
function drawProp(p){const q=iso(p.x,p.y),s=p.s;if(q.x<-80||q.x>W+80||q.y<-80||q.y>H+80)return;if(p.t==='rock'){ellipse(q.x,q.y+5,7*s,4*s,'rgba(0,0,0,.25)');ctx.fillStyle='#657082';ctx.beginPath();ctx.moveTo(q.x-5*s,q.y);ctx.lineTo(q.x+4*s,q.y-4*s);ctx.lineTo(q.x+9*s,q.y+3*s);ctx.lineTo(q.x-2*s,q.y+7*s);ctx.fill();return}ellipse(q.x,q.y+11,12*s,5*s,'rgba(0,0,0,.28)');ctx.fillStyle='#54351f';ctx.fillRect(q.x-2*s,q.y-18*s,4*s,26*s);let gr=ctx.createRadialGradient(q.x-5*s,q.y-25*s,2,q.x,q.y-21*s,18*s);gr.addColorStop(0,'#59a86a');gr.addColorStop(1,'#1e5a36');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(q.x,q.y-22*s,16*s,0,6.283);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.14)';ctx.stroke()}
function drawBuilding(b){const q=iso(b.x,b.y),w=b.w*1.08,h=b.h*.66,z=b.z;if(q.x<-120||q.x>W+120||q.y<-120||q.y>H+120)return;ellipse(q.x,q.y+z*.02,w*1.05,h*.9,'rgba(0,0,0,.26)');ctx.save();ctx.translate(q.x,q.y);let top='#59667e',side=b.c,side2='#202838';ctx.fillStyle=side;ctx.beginPath();ctx.moveTo(-w,0);ctx.lineTo(0,h);ctx.lineTo(0,h-z);ctx.lineTo(-w,-z);ctx.closePath();ctx.fill();ctx.fillStyle=side2;ctx.beginPath();ctx.moveTo(w,0);ctx.lineTo(0,h);ctx.lineTo(0,h-z);ctx.lineTo(w,-z);ctx.closePath();ctx.fill();ctx.fillStyle=top;ctx.beginPath();ctx.moveTo(-w,-z);ctx.lineTo(0,-h-z);ctx.lineTo(w,-z);ctx.lineTo(0,h-z);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,.12)';ctx.stroke();for(let yy=-z+8;yy<h-z-2;yy+=11){for(let xx=-w*.72;xx<-.1;xx+=10){ctx.fillStyle='rgba(255,210,110,.72)';ctx.fillRect(xx,yy,4,5)}for(let xx=3;xx<w*.72;xx+=10){ctx.fillStyle='rgba(138,198,255,.54)';ctx.fillRect(xx,yy,4,5)}}ctx.restore()}
function drawParticle(p){const q=iso(p.x,p.y);ctx.save();ctx.globalAlpha=clamp(p.life,0,1);ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(q.x,q.y-10,3+p.life*3,0,6.283);ctx.fill();ctx.restore()}
function drawUnit(u){const q=iso(u.x,u.y);if(q.x<-80||q.x>W+80||q.y<-110||q.y>H+80)return;const bob=Math.sin(performance.now()/220+u.x)*2;if(u.type==='npc')drawNpc(q.x,q.y+bob,u);else drawLeader(q.x,q.y+bob,u);if(u.type!=='npc')drawName(q.x,q.y-62-u.stage*8,u)}
function drawNpc(x,y,u){ellipse(x,y+9,10,5,'rgba(0,0,0,.35)');ctx.save();ctx.translate(x,y);ctx.lineWidth=2;ctx.strokeStyle='rgba(0,0,0,.55)';ctx.fillStyle='#91e3a2';roundRect(-7,-19,14,20,6);ctx.fill();ctx.stroke();ctx.fillStyle='#ffd1ab';ctx.beginPath();ctx.arc(0,-26,8,0,6.283);ctx.fill();ctx.stroke();ctx.fillStyle='#4b2d1e';ctx.beginPath();ctx.arc(0,-30,8,3.1,6.2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(-3,-27,2,2);ctx.fillRect(3,-27,2,2);ctx.restore()}
function drawLeader(x,y,u){const st=u.stage,enemy=u.type==='enemy',scale=1+st*.09,pal=stagePalette[st],dark=enemy?'#351621':'#132d4b';ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ellipse(0,14,25+st*3,9+st,'rgba(0,0,0,.38)');ctx.lineJoin='round';ctx.lineCap='round';ctx.lineWidth=3;ctx.strokeStyle='rgba(4,6,10,.78)';if(st>=3){ctx.fillStyle=enemy?'#9c1d35':'#214a88';ctx.beginPath();ctx.moveTo(-21,-38);ctx.quadraticCurveTo(-43,-5,-26,30);ctx.lineTo(0,21);ctx.lineTo(26,30);ctx.quadraticCurveTo(43,-5,21,-38);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='rgba(255,255,255,.14)';ctx.beginPath();ctx.moveTo(-16,-35);ctx.quadraticCurveTo(-26,-5,-16,16);ctx.lineTo(-4,11);ctx.quadraticCurveTo(-10,-10,-8,-34);ctx.fill()}drawLegs(st);drawBody(st,pal,dark,enemy);drawArms(st,pal,enemy);drawHead(st,enemy);if(st>=1)drawSword(st,enemy);if(st>=2)drawShield(st,enemy);if(st>=4)drawCrown(st,enemy);if(st>=5)drawEmperorAura(enemy);ctx.restore()}
function drawLegs(st){ctx.fillStyle='#27202a';roundRect(-13,-3,10,22,5);ctx.fill();ctx.stroke();roundRect(3,-3,10,22,5);ctx.fill();ctx.stroke();ctx.fillStyle='#10131c';roundRect(-17,17,15,7,3);ctx.fill();ctx.stroke();roundRect(2,17,15,7,3);ctx.fill();ctx.stroke()}
function drawBody(st,pal,dark,enemy){let g=ctx.createLinearGradient(0,-56,0,8);g.addColorStop(0,st>=2?'#dfe8f3':pal);g.addColorStop(.55,st>=2?'#77879b':pal);g.addColorStop(1,dark);ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(-24,-49);ctx.lineTo(24,-49);ctx.quadraticCurveTo(30,-22,18,6);ctx.lineTo(-18,6);ctx.quadraticCurveTo(-30,-22,-24,-49);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=st>=2?'rgba(255,255,255,.28)':'rgba(255,255,255,.18)';ctx.beginPath();ctx.moveTo(-14,-45);ctx.lineTo(2,-45);ctx.lineTo(-5,3);ctx.lineTo(-18,1);ctx.closePath();ctx.fill();ctx.fillStyle=st>=1?'#ffd36a':'#c69b62';roundRect(-18,-15,36,7,3);ctx.fill();ctx.stroke();ctx.fillStyle=enemy?'#ff4f66':'#75caff';ctx.beginPath();ctx.arc(0,-29,5+st,0,6.283);ctx.fill();ctx.stroke();ctx.fillStyle=st>=2?'#cdd8e6':'#6d7a8f';ctx.beginPath();ctx.ellipse(-27,-45,13,8,.35,0,6.283);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(27,-45,13,8,-.35,0,6.283);ctx.fill();ctx.stroke()}
function drawArms(st,pal,enemy){ctx.strokeStyle='rgba(4,6,10,.78)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(-24,-39);ctx.lineTo(-36,-16);ctx.stroke();ctx.beginPath();ctx.moveTo(24,-39);ctx.lineTo(38,-17);ctx.stroke();ctx.strokeStyle=st>=2?'#bcc8d6':pal;ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(-24,-39);ctx.lineTo(-36,-16);ctx.stroke();ctx.beginPath();ctx.moveTo(24,-39);ctx.lineTo(38,-17);ctx.stroke();ctx.fillStyle='#ffd1ab';ctx.beginPath();ctx.arc(-38,-12,5,0,6.283);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(39,-13,5,0,6.283);ctx.fill();ctx.stroke()}
function drawHead(st,enemy){ctx.fillStyle='#ffd1ab';ctx.beginPath();ctx.ellipse(0,-70,17,20,0,0,6.283);ctx.fill();ctx.stroke();let hair=['#3b2416','#7a4320','#d7b66e','#161820','#6532ce','#f3f5ff'][st];ctx.fillStyle=hair;ctx.beginPath();ctx.moveTo(-18,-78);ctx.quadraticCurveTo(-8,-99,17,-82);ctx.quadraticCurveTo(13,-68,-18,-67);ctx.closePath();ctx.fill();ctx.stroke();for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*7,-84);ctx.quadraticCurveTo(i*7+3,-75,i*5,-65);ctx.stroke()}ctx.fillStyle=enemy?'#ff3754':'#67cfff';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=7;ctx.beginPath();ctx.arc(-6,-71,2.2,0,6.283);ctx.fill();ctx.beginPath();ctx.arc(6,-71,2.2,0,6.283);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='#71332d';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-5,-60);ctx.quadraticCurveTo(0,-57,6,-60);ctx.stroke();if(st>=3){ctx.fillStyle='rgba(220,230,245,.82)';ctx.beginPath();ctx.moveTo(-19,-82);ctx.lineTo(19,-82);ctx.lineTo(12,-69);ctx.lineTo(-12,-69);ctx.closePath();ctx.fill();ctx.stroke()}}
function drawSword(st,enemy){ctx.save();ctx.translate(42,-23);ctx.rotate(-.65);let lg=ctx.createLinearGradient(0,-42,0,18);lg.addColorStop(0,'#ffffff');lg.addColorStop(.5,'#c9d8e8');lg.addColorStop(1,'#7d8da1');ctx.fillStyle=lg;ctx.beginPath();ctx.moveTo(0,-58-st*4);ctx.lineTo(7,0);ctx.lineTo(0,13);ctx.lineTo(-7,0);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=enemy?'#ff4f66':'#78caff';roundRect(-13,2,26,5,2);ctx.fill();ctx.stroke();ctx.fillStyle='#3b2b1e';roundRect(-4,7,8,18,3);ctx.fill();ctx.stroke();ctx.restore()}
function drawShield(st,enemy){ctx.save();ctx.translate(-39,-23);let g=ctx.createLinearGradient(0,-28,0,20);g.addColorStop(0,enemy?'#ff6b7d':'#8dd2ff');g.addColorStop(1,enemy?'#681728':'#1a4772');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,-29);ctx.quadraticCurveTo(-22,-24,-19,-2);ctx.quadraticCurveTo(-14,17,0,24);ctx.quadraticCurveTo(14,17,19,-2);ctx.quadraticCurveTo(22,-24,0,-29);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.moveTo(-3,-22);ctx.lineTo(8,-19);ctx.lineTo(-2,13);ctx.lineTo(-12,7);ctx.closePath();ctx.fill();ctx.restore()}
function drawCrown(st,enemy){ctx.fillStyle=enemy?'#ff5b68':'#ffdc6d';ctx.beginPath();ctx.moveTo(-18,-91);ctx.lineTo(-10,-105);ctx.lineTo(-2,-92);ctx.lineTo(7,-107);ctx.lineTo(15,-91);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#fff7bf';ctx.beginPath();ctx.arc(7,-107,3,0,6.283);ctx.fill()}
function drawEmperorAura(enemy){ctx.save();ctx.globalAlpha=.55;ctx.strokeStyle=enemy?'#ff4d60':'#ffe17a';ctx.lineWidth=2;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=18;ctx.beginPath();ctx.ellipse(0,-38,39,70,0,0,6.283);ctx.stroke();ctx.beginPath();ctx.ellipse(0,-38,50,84,0,0,6.283);ctx.stroke();ctx.restore()}
function drawName(x,y,u){ctx.save();ctx.font='800 12px system-ui';const text=`${u.name} ${Math.floor(u.score)}점 · ${stageNames[u.stage]}`;const w=ctx.measureText(text).width+18;ctx.fillStyle='rgba(4,7,12,.7)';roundRect(x-w/2,y-15,w,23,9);ctx.fill();ctx.strokeStyle=u.type==='player'?'rgba(120,200,255,.8)':'rgba(255,98,116,.8)';ctx.stroke();ctx.fillStyle=u.type==='player'?'#bfe6ff':'#ffb1bc';ctx.textAlign='center';ctx.fillText(text,x,y+1);ctx.restore()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}function drawVignette(){let g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.7);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.46)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}
function loop(t){if(state!=='playing')return;requestAnimationFrame(loop);let dt=Math.min((t-last)/1000,.035);last=t;update(dt);draw()}
function togglePause(){if(state==='playing'){state='paused';$('pause').classList.remove('hidden')}else if(state==='paused'){state='playing';$('pause').classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}}
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Escape'||e.code==='KeyP')togglePause()});addEventListener('keyup',e=>keys[e.code]=false);
$('start').onclick=reset;$('again').onclick=reset;$('restart').onclick=reset;$('resume').onclick=togglePause;$('pauseBtn').onclick=togglePause;$('how').onclick=()=>$('help').classList.remove('hidden');$('back').onclick=()=>$('help').classList.add('hidden');
const joyEl=$('joy'),knob=$('knob');let touching=false;function setJoy(e){const r=joyEl.getBoundingClientRect(),p=e.touches?e.touches[0]:e;let x=p.clientX-(r.left+r.width/2),y=p.clientY-(r.top+r.height/2),l=Math.hypot(x,y),m=48;if(l>m){x=x/l*m;y=y/l*m}joy.x=x/m;joy.y=y/m;knob.style.transform=`translate(${x}px,${y}px)`}joyEl.addEventListener('pointerdown',e=>{touching=true;joyEl.setPointerCapture(e.pointerId);setJoy(e)});joyEl.addEventListener('pointermove',e=>{if(touching)setJoy(e)});joyEl.addEventListener('pointerup',()=>{touching=false;joy.x=joy.y=0;knob.style.transform='translate(0,0)'});
