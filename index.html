<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>에라 도미니언 3D</title>
  <style>
    :root{
      --bg:#07111f;--panel:rgba(8,16,30,.82);--panel2:rgba(10,22,42,.92);--line:rgba(150,205,255,.25);
      --gold:#ffd25b;--blue:#2f8cff;--cyan:#6bf1ff;--red:#ff4f55;--purple:#b15cff;
      --text:#f6fbff;--muted:#a9bdd5;
    }
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050b15;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    button{font-family:inherit;cursor:pointer;border:0;color:inherit}
    #app{width:100vw;height:100svh;position:relative;overflow:hidden;background:radial-gradient(circle at top,#17365b 0%,#08111f 42%,#03070d 100%)}
    .screen{position:absolute;inset:0;display:none;overflow:hidden}.screen.active{display:block}
    #home{overflow:auto;padding:28px;scroll-behavior:smooth}.home-bg{position:fixed;inset:0;background:linear-gradient(135deg,rgba(12,28,50,.96),rgba(5,9,17,.98)),radial-gradient(circle at 30% 20%,rgba(81,168,255,.24),transparent 35%);pointer-events:none}.home-wrap{position:relative;max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1.08fr .92fr;gap:22px;align-items:stretch}.hero,.panel,.stage-card,.evo-card,.feature-card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(13,28,51,.86),rgba(6,13,25,.86));box-shadow:0 18px 60px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.06);border-radius:18px;backdrop-filter:blur(10px)}
    .hero{min-height:520px;position:relative;overflow:hidden;padding:34px}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 55% 55%,rgba(45,140,255,.25),transparent 25%),linear-gradient(155deg,rgba(255,207,90,.12),transparent 45%);}.logo{position:relative;font-weight:1000;font-size:clamp(42px,5vw,82px);letter-spacing:-4px;color:#ffd45e;text-shadow:0 5px 0 #6a3d00,0 12px 24px rgba(0,0,0,.65)}.logo small{display:block;font-size:clamp(18px,2vw,26px);letter-spacing:0;color:white;text-shadow:0 2px 8px #000;margin-top:6px}.hero-art{position:absolute;left:0;right:0;bottom:0;height:68%;background:linear-gradient(to top,rgba(0,0,0,.18),transparent);}.fake-town{position:absolute;inset:auto 4% 7% 4%;height:75%;transform:perspective(900px) rotateX(58deg);transform-origin:50% 80%;border-radius:42px;background:repeating-linear-gradient(45deg,#9a7951 0 34px,#8c6d48 34px 68px);box-shadow:0 40px 70px rgba(0,0,0,.5);overflow:hidden}.fake-town div{position:absolute;border-radius:7px;background:linear-gradient(135deg,#7a4b31,#352219);box-shadow:10px 10px 0 rgba(0,0,0,.25)}.fake-town div:before{content:"";position:absolute;inset:-22px 8px auto 8px;height:28px;background:linear-gradient(135deg,#4f2f22,#1b1110);transform:skewX(-18deg);border-radius:5px}.orb{position:absolute;border-radius:50%;background:linear-gradient(#58a5ff,#0057e7);box-shadow:0 18px 26px rgba(0,0,0,.42)}.orb.gray{background:linear-gradient(#d9d5c9,#77736a)}.orb.gold{background:linear-gradient(#fff1a8,#c48900)}.hero-actions{position:absolute;left:34px;bottom:34px;display:flex;gap:12px;flex-wrap:wrap}.btn{padding:15px 22px;border-radius:14px;background:linear-gradient(180deg,#3f95ff,#0a5be0);font-weight:900;font-size:17px;box-shadow:0 12px 28px rgba(28,104,255,.35),inset 0 1px 0 rgba(255,255,255,.35)}.btn.secondary{background:rgba(255,255,255,.1);border:1px solid var(--line);box-shadow:none}.side{display:flex;flex-direction:column;gap:16px}.panel{padding:24px}.panel h2{margin:0 0 14px;font-size:32px}.evo-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.evo-card{padding:14px 8px;text-align:center;min-height:205px}.evo-title{font-weight:900;font-size:14px}.char-preview{height:92px;margin:10px auto;position:relative}.char-body{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);width:42px;height:58px;border-radius:18px 18px 10px 10px;background:linear-gradient(#3ea0ff,#095ddf);box-shadow:0 0 22px rgba(47,140,255,.6)}.char-body:before{content:"";position:absolute;left:50%;top:-26px;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:inherit}.lv2 .char-body{background:linear-gradient(#5cd9ff,#0a63b6)}.lv3 .char-body{background:linear-gradient(#c881ff,#5420b7)}.lv4 .char-body{background:linear-gradient(#ff685e,#9e1d1d)}.lv5 .char-body{background:linear-gradient(#ffe777,#c68500)}.lv6 .char-body{background:linear-gradient(#fff8d6,#b68219);width:52px;height:68px}.crown{position:absolute;left:50%;top:-2px;transform:translateX(-50%);color:#ffd34f;font-size:24px;text-shadow:0 0 12px #ffb000}.stage-strip{position:relative;max-width:1400px;margin:22px auto 0;display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.stage-card{overflow:hidden}.stage-img{height:160px;background:linear-gradient(135deg,#8e7147,#2d5330);position:relative}.stage-card:nth-child(2) .stage-img{background:linear-gradient(135deg,#778c9c,#34405b)}.stage-card:nth-child(3) .stage-img{background:linear-gradient(135deg,#8a5a3d,#2e2e35)}.stage-card:nth-child(4) .stage-img{background:linear-gradient(135deg,#3d6b96,#172334)}.stage-card:nth-child(5) .stage-img{background:linear-gradient(135deg,#6422ab,#062d52)}.stage-img:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.12) 0 8px,transparent 8px 36px)}.stage-card h3{margin:12px 14px 2px}.stage-card p{margin:0 14px 14px;color:var(--muted);font-size:14px;line-height:1.45}
    #game{background:#05080e}.hud{position:absolute;z-index:20;pointer-events:none}.top-left{top:14px;left:14px;width:min(330px,calc(100vw - 28px));padding:12px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,.45)}.avatar{display:flex;gap:12px;align-items:center}.avatar-icon{width:52px;height:52px;border-radius:15px;background:linear-gradient(#56aaff,#005be9);box-shadow:inset 0 2px rgba(255,255,255,.35),0 0 18px rgba(47,140,255,.5);position:relative}.avatar-icon:before{content:"";position:absolute;left:50%;top:6px;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.35)}.bar{height:9px;border-radius:99px;background:#16233b;overflow:hidden;margin-top:6px}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#2f8cff,#6bf1ff)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.stat{background:rgba(0,0,0,.28);padding:8px;border-radius:10px;font-size:13px}.stat b{display:block;font-size:18px;color:white}.top-center{top:14px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:16px;background:rgba(3,8,15,.82);border:1px solid var(--line);font-weight:900;font-size:24px}.top-right{right:14px;top:14px;width:250px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}.rank-title{font-weight:900;margin-bottom:8px}.rank-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#dfeaff}.bottom-tip{left:50%;bottom:18px;transform:translateX(-50%);padding:11px 18px;background:rgba(0,0,0,.62);border:1px solid var(--line);border-radius:999px;font-weight:800;white-space:nowrap}.minimap{right:18px;bottom:18px;width:140px;height:140px;border-radius:50%;background:rgba(2,10,18,.75);border:2px solid rgba(255,219,104,.65);box-shadow:0 12px 30px rgba(0,0,0,.45);overflow:hidden}.minimap canvas{width:100%;height:100%}.joy{position:absolute;left:24px;bottom:28px;width:140px;height:140px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);z-index:30;display:none}.joy:before{content:"";position:absolute;left:50%;top:50%;width:58px;height:58px;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45)}.game-menu{position:absolute;z-index:35;left:14px;top:auto;bottom:14px;display:flex;gap:8px}.smallbtn{pointer-events:auto;padding:10px 13px;border-radius:10px;background:rgba(8,16,30,.85);border:1px solid var(--line);font-weight:800}.overlay{position:absolute;inset:0;z-index:60;background:rgba(1,5,12,.76);display:none;align-items:center;justify-content:center;padding:20px}.overlay.show{display:flex}.modal{width:min(560px,92vw);background:linear-gradient(180deg,#122642,#071020);border:1px solid var(--line);border-radius:24px;padding:28px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.6)}.modal h2{font-size:42px;margin:0 0 10px;color:var(--gold)}.modal p{color:var(--muted);line-height:1.55}.toast{position:absolute;z-index:50;left:50%;top:22%;transform:translateX(-50%);font-weight:1000;font-size:clamp(34px,6vw,80px);color:#fff6b2;text-shadow:0 0 20px #ffb000,0 8px 0 rgba(80,35,0,.7);opacity:0;pointer-events:none}.toast.show{animation:pop 1.2s ease both}@keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.7)}20%{opacity:1;transform:translateX(-50%) scale(1.1)}75%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1.22)}}
    canvas#world{display:block;width:100%;height:100%}.hidden{display:none!important}
    @media(max-width:1000px){#home{padding:14px}.home-wrap{grid-template-columns:1fr}.stage-strip{grid-template-columns:1fr 1fr}.evo-grid{grid-template-columns:repeat(3,1fr)}.top-right{display:none}.bottom-tip{font-size:13px;bottom:170px}.joy{display:block}.game-menu{bottom:auto;top:88px}.minimap{width:108px;height:108px}.top-center{font-size:18px}.hero{min-height:480px}.logo{letter-spacing:-2px}}
  </style>
</head>
<body>
<div id="app">
  <section id="home" class="screen active">
    <div class="home-bg"></div>
    <div class="home-wrap">
      <div class="hero">
        <div class="logo">♛ 에라 도미니언<small>문명의 황제</small></div>
        <div class="hero-art"><div class="fake-town" id="fakeTown"></div></div>
        <div class="hero-actions">
          <button class="btn" id="startBtn">게임 시작하기</button>
          <button class="btn secondary" data-scroll="evolution">진화 단계 보기</button>
          <button class="btn secondary" data-scroll="stages">스테이지 보기</button>
        </div>
      </div>
      <div class="side">
        <div class="panel" id="evolution"><h2>세력을 모아 진화하라</h2><p style="color:var(--muted);line-height:1.55">100명을 모으면 다음 단계로 진화합니다. 단계가 오르면 외형, 별 등급, 흡수 범위, 점수 배율이 달라집니다.</p><div class="evo-grid" id="evoGrid"></div></div>
        <div class="panel"><h2>게임 방법</h2><p style="color:var(--muted);line-height:1.65">WASD 또는 방향키로 이동하세요. 회색 시민을 흡수하고, 나보다 약한 세력은 잡아먹고, 강한 세력은 피하세요. 건물과 나무는 지나갈 수 없습니다.</p></div>
      </div>
    </div>
    <div class="stage-strip" id="stages"></div>
  </section>
  <section id="game" class="screen">
    <canvas id="world"></canvas>
    <div class="hud top-left"><div class="avatar"><div class="avatar-icon" id="avatarIcon"></div><div style="flex:1"><b id="levelName">시민 리더</b><div id="levelText" style="color:var(--muted);font-size:13px">Lv.1 ★</div><div class="bar"><i id="evoBar"></i></div></div></div><div class="stats"><div class="stat">세력 수<b id="powerText">1</b></div><div class="stat">흡수 범위<b id="rangeText">8m</b></div><div class="stat">킬 수<b id="killText">0</b></div><div class="stat">점수<b id="scoreText">0</b></div></div></div>
    <div class="hud top-center" id="timerText">03:00</div>
    <div class="hud top-right"><div class="rank-title">세력 랭킹</div><div id="rankList"></div></div>
    <div class="hud bottom-tip" id="tipText">100명을 흡수하면 다음 단계로 진화합니다.</div>
    <div class="minimap hud"><canvas id="mini"></canvas></div>
    <div class="joy" id="joy"></div>
    <div class="game-menu"><button class="smallbtn" id="restartBtn">다시 시작</button><button class="smallbtn" id="homeBtn">홈으로</button></div>
    <div class="toast" id="toast">EVOLUTION</div>
    <div class="overlay" id="gameOver"><div class="modal"><h2 id="overTitle">GAME OVER</h2><p id="overDesc"></p><button class="btn" id="againBtn">다시하기</button><button class="btn secondary" id="goHomeBtn">홈으로</button></div></div>
  </section>
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const $=s=>document.querySelector(s);
const home=$('#home'),game=$('#game'),canvas=$('#world'),mini=$('#mini');
const fakeTown=$('#fakeTown');
for(let i=0;i<24;i++){const d=document.createElement('div');d.style.left=(Math.random()*92)+'%';d.style.top=(Math.random()*82+8)+'%';d.style.width=(22+Math.random()*42)+'px';d.style.height=(22+Math.random()*42)+'px';fakeTown.appendChild(d)}
for(let i=0;i<58;i++){const o=document.createElement('i');o.className='orb '+(i%5?'gray':'');o.style.left=(8+Math.random()*84)+'%';o.style.bottom=(8+Math.random()*52)+'%';o.style.width=o.style.height=(10+Math.random()*16)+'px';$('.hero').appendChild(o)}
const levels=[
 {name:'시민 리더',stars:'★',color:0x1673ff,need:100,mult:1,range:7,scale:1,tag:'Lv.1'},
 {name:'도시 대장',stars:'★★',color:0x25c7ff,need:100,mult:10,range:9,scale:1.15,tag:'Lv.2'},
 {name:'구역 지배자',stars:'★★★',color:0x8f4dff,need:100,mult:100,range:11,scale:1.32,tag:'Lv.3'},
 {name:'도시 군주',stars:'★★★★',color:0xff4d43,need:100,mult:1000,range:13,scale:1.52,tag:'Lv.4'},
 {name:'도시의 왕',stars:'★★★★★',color:0xffc629,need:100,mult:10000,range:16,scale:1.78,tag:'Lv.5'},
 {name:'도시의 황제',stars:'★★★★★★',color:0xfff1a0,need:99999,mult:100000,range:20,scale:2.05,tag:'Lv.6'}
];
$('#evoGrid').innerHTML=levels.map((l,i)=>`<div class="evo-card lv${i+1}"><div class="evo-title">${i+1}단계<br>${l.name}</div><div class="char-preview"><span class="crown">${i>3?'♛':i>1?'♜':''}</span><div class="char-body"></div></div><div style="color:#ffd25b;font-weight:900">${l.stars}</div><div style="font-size:12px;color:var(--muted);margin-top:5px">점수 x${l.mult.toLocaleString()}</div></div>`).join('');
const stageNames=['고대 마을','중세 왕국','산업 도시','현대 메트로폴리스','미래 도시'];
$('#stages').innerHTML=stageNames.map((n,i)=>`<div class="stage-card"><div class="stage-img"></div><h3>${i+1}. ${n}</h3><p>${i===0?'작은 마을에서 첫 세력을 키우세요.':'다음 업데이트에서 확장 예정입니다.'}</p></div>`).join('');
document.querySelectorAll('[data-scroll]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.scroll).scrollIntoView({behavior:'smooth',block:'center'}));
$('#startBtn').onclick=()=>startGame();$('#homeBtn').onclick=()=>showHome();$('#goHomeBtn').onclick=()=>showHome();$('#againBtn').onclick=()=>startGame();$('#restartBtn').onclick=()=>startGame();
let scene,camera,renderer,clock,player,followers=[],npcs=[],enemies=[],obstacles=[],particles=[],labels=[],keys={},state,animationId;
const worldSize=260;
function showGame(){home.classList.remove('active');game.classList.add('active');document.body.scrollTop=0;document.documentElement.scrollTop=0;setTimeout(resize,30)}
function showHome(){game.classList.remove('active');home.classList.add('active');cancelAnimationFrame(animationId)}
function startGame(){showGame();$('#gameOver').classList.remove('show');init3D();}
function init3D(){cancelAnimationFrame(animationId);scene=new THREE.Scene();scene.background=new THREE.Color(0x07111f);scene.fog=new THREE.Fog(0x07111f,110,245);camera=new THREE.PerspectiveCamera(45,1,.1,700);renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio,1.8));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;clock=new THREE.Clock();followers=[];npcs=[];enemies=[];obstacles=[];particles=[];labels=[];state={score:0,kills:0,time:180,over:false};
 const hemi=new THREE.HemisphereLight(0xbfd8ff,0x47321d,2.2);scene.add(hemi);const sun=new THREE.DirectionalLight(0xffe0a6,3.1);sun.position.set(-45,80,35);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-150;sun.shadow.camera.right=150;sun.shadow.camera.top=150;sun.shadow.camera.bottom=-150;scene.add(sun);
 createGround();createTown();player=createUnit(0,0,0,0,true);player.power=1;player.collected=1;player.score=0;player.level=0;player.speed=26;player.team='player';player.targetPath=[];scene.add(player.group);
 for(let i=0;i<210;i++) spawnNpc();
 for(let i=0;i<7;i++) spawnEnemy(i);
 resize();animate();}
function createGround(){const g=new THREE.Group();const base=new THREE.Mesh(new THREE.PlaneGeometry(worldSize,worldSize),new THREE.MeshStandardMaterial({color:0x6f5a3d,roughness:.92}));base.rotation.x=-Math.PI/2;base.receiveShadow=true;g.add(base);const tileMat1=new THREE.MeshStandardMaterial({color:0x8d7554,roughness:.9});const tileMat2=new THREE.MeshStandardMaterial({color:0x7c6649,roughness:.9});for(let x=-worldSize/2;x<worldSize/2;x+=8){for(let z=-worldSize/2;z<worldSize/2;z+=8){if(Math.random()<.82){const t=new THREE.Mesh(new THREE.BoxGeometry(7.75,.18,7.75),Math.random()<.5?tileMat1:tileMat2);t.position.set(x+4,.02,z+4);t.receiveShadow=true;g.add(t)}}}scene.add(g)}
function createTown(){const spots=[];for(let i=0;i<38;i++){let p=randomPos();if(Math.abs(p.x)<28&&Math.abs(p.z)<28){i--;continue}spots.push(p);if(i%4===0)createTree(p.x,p.z);else createHouse(p.x,p.z,9+Math.random()*6,9+Math.random()*8)}createFountain(-40,28);createFountain(46,-36);for(let x=-worldSize/2;x<=worldSize/2;x+=16){createTree(x,-worldSize/2+6);createTree(x,worldSize/2-6)}for(let z=-worldSize/2;z<=worldSize/2;z+=16){createTree(-worldSize/2+6,z);createTree(worldSize/2-6,z)}}
function createHouse(x,z,w,d){const h=8+Math.random()*9;const group=new THREE.Group();const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(.06+Math.random()*.04,.45,.32),roughness:.75}));body.position.y=h/2;body.castShadow=body.receiveShadow=true;group.add(body);const roof=new THREE.Mesh(new THREE.ConeGeometry(Math.max(w,d)*.78,5,4),new THREE.MeshStandardMaterial({color:0x3b2118,roughness:.82}));roof.position.y=h+2.5;roof.rotation.y=Math.PI/4;roof.castShadow=true;group.add(roof);const door=new THREE.Mesh(new THREE.BoxGeometry(w*.22,h*.32,.25),new THREE.MeshStandardMaterial({color:0x1d1210}));door.position.set(0,h*.16,d/2+.15);group.add(door);group.position.set(x,0,z);scene.add(group);obstacles.push({x,z,r:Math.max(w,d)*.75+1})}
function createTree(x,z){const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.8,1.1,5,8),new THREE.MeshStandardMaterial({color:0x573820}));trunk.position.set(x,2.5,z);trunk.castShadow=true;scene.add(trunk);const crown=new THREE.Mesh(new THREE.DodecahedronGeometry(5+Math.random()*2),new THREE.MeshStandardMaterial({color:0x315f2f,roughness:.8}));crown.position.set(x,8,z);crown.castShadow=true;scene.add(crown);obstacles.push({x,z,r:5.5})}
function createFountain(x,z){const base=new THREE.Mesh(new THREE.CylinderGeometry(9,10,2,32),new THREE.MeshStandardMaterial({color:0x8d8b80,roughness:.7}));base.position.set(x,1,z);base.castShadow=base.receiveShadow=true;scene.add(base);const water=new THREE.Mesh(new THREE.CylinderGeometry(7.5,7.5,.35,32),new THREE.MeshStandardMaterial({color:0x3f9cff,metalness:.1,roughness:.2,transparent:true,opacity:.72}));water.position.set(x,2.2,z);scene.add(water);obstacles.push({x,z,r:10})}
function unitMaterial(color){return new THREE.MeshStandardMaterial({color,roughness:.48,metalness:.05})}
function createUnit(x,z,level=0,color=null,isPlayer=false){const l=levels[level];const c=color??l.color;const mat=unitMaterial(c);const group=new THREE.Group();const s=l.scale;const body=new THREE.Mesh(new THREE.CapsuleGeometry(1.35*s,3.7*s,5,12),mat);body.position.y=2.7*s;body.castShadow=true;group.add(body);const head=new THREE.Mesh(new THREE.SphereGeometry(1.55*s,18,14),mat);head.position.y=6.1*s;head.castShadow=true;group.add(head);if(level>=1){const cape=new THREE.Mesh(new THREE.BoxGeometry(2.2*s,.18,3.2*s),new THREE.MeshStandardMaterial({color:0x08234d,roughness:.5}));cape.position.set(0,3.6*s,-1.55*s);cape.rotation.x=.28;group.add(cape)}if(level>=2){const helm=new THREE.Mesh(new THREE.ConeGeometry(1.5*s,1.8*s,16),new THREE.MeshStandardMaterial({color:0xffd25b,metalness:.35,roughness:.32}));helm.position.y=7.75*s;group.add(helm)}if(level>=4){const crown=new THREE.Mesh(new THREE.TorusGeometry(1.75*s,.17*s,8,28),new THREE.MeshStandardMaterial({color:0xffd25b,emissive:0x553500,metalness:.7,roughness:.2}));crown.position.y=7.3*s;crown.rotation.x=Math.PI/2;group.add(crown)}const ring=new THREE.Mesh(new THREE.TorusGeometry(l.range,.08,8,96),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:isPlayer?.42:.22}));ring.rotation.x=Math.PI/2;ring.position.y=.15;group.add(ring);const label=makeLabel(`${l.name} | ${l.tag}\n${l.stars}  1`);label.position.y=10*s;group.add(label);group.position.set(x,0,z);return {group,level,color:c,power:1,collected:1,score:0,range:l.range,radius:1.8*s,speed:18,dir:new THREE.Vector3(Math.random()-.5,0,Math.random()-.5).normalize(),label,ring,team:'neutral',ai:0,dead:false}}
function makeLabel(text){const cn=document.createElement('canvas');cn.width=512;cn.height=160;const ctx=cn.getContext('2d');const tex=new THREE.CanvasTexture(cn);const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));spr.scale.set(13,4,1);spr.userData={cn,ctx,tex,text:''};updateLabel(spr,text,0x2f8cff);return spr}
function updateLabel(spr,text,color=0x2f8cff){if(spr.userData.text===text&&spr.userData.color===color)return;spr.userData.text=text;spr.userData.color=color;const {cn,ctx,tex}=spr.userData;ctx.clearRect(0,0,cn.width,cn.height);ctx.fillStyle='rgba(3,8,15,.78)';round(ctx,18,18,476,124,22);ctx.fill();ctx.lineWidth=4;ctx.strokeStyle='#'+color.toString(16).padStart(6,'0');ctx.stroke();ctx.font='800 34px system-ui';ctx.fillStyle='white';ctx.textAlign='center';const lines=text.split('\n');ctx.fillText(lines[0],256,62);ctx.font='900 34px system-ui';ctx.fillStyle='#ffd25b';ctx.fillText(lines[1]||'',256,108);tex.needsUpdate=true}
function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function spawnNpc(){let p=safePos();const u=createUnit(p.x,p.z,0,0xb8b2a5,false);u.team='neutral';u.speed=4+Math.random()*5;scene.add(u.group);npcs.push(u)}
function spawnEnemy(i){let p=safePos(45);const lv=Math.min(4,Math.floor(Math.random()*3));const palette=[0xff3838,0x9b55ff,0x31d158,0xffbd2e,0xff7a33,0xdb4bff,0x45d6ff];const e=createUnit(p.x,p.z,lv,palette[i%palette.length],false);e.team='enemy';e.power=30+Math.floor(Math.random()*160)*(lv+1);e.collected=e.power;e.speed=14+Math.random()*5;e.ai=Math.random()*10;scene.add(e.group);enemies.push(e)}
function randomPos(){return {x:(Math.random()-.5)*(worldSize-18),z:(Math.random()-.5)*(worldSize-18)}}
function safePos(minCenter=0){for(let k=0;k<500;k++){const p=randomPos();if(Math.hypot(p.x,p.z)<minCenter)continue;if(!blocked(p.x,p.z,4))return p}return randomPos()}
function blocked(x,z,r){if(Math.abs(x)>worldSize/2-r||Math.abs(z)>worldSize/2-r)return true;return obstacles.some(o=>Math.hypot(x-o.x,z-o.z)<o.r+r)}
function moveUnit(u,dx,dz,dt){if(dx||dz){const len=Math.hypot(dx,dz)||1;dx/=len;dz/=len;const step=u.speed*dt;tryMove(u,dx*step,0);tryMove(u,0,dz*step);u.group.rotation.y=Math.atan2(dx,dz)}}
function tryMove(u,dx,dz){const nx=u.group.position.x+dx,nz=u.group.position.z+dz;if(!blocked(nx,nz,u.radius)){u.group.position.x=nx;u.group.position.z=nz}else{for(let a=0;a<8;a++){const ang=a*Math.PI/4;const sx=Math.cos(ang)*Math.hypot(dx,dz)*.65,sz=Math.sin(ang)*Math.hypot(dx,dz)*.65;if(!blocked(u.group.position.x+sx,u.group.position.z+sz,u.radius)){u.group.position.x+=sx;u.group.position.z+=sz;break}}}}
function animate(){animationId=requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.033);if(!state.over){update(dt);state.time-=dt;if(state.time<=0)endGame('TIME UP','시간이 종료되었습니다.')}render();}
function update(dt){let dx=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0);let dz=(keys.KeyS||keys.ArrowDown?1:0)-(keys.KeyW||keys.ArrowUp?1:0);if(joyVec.x||joyVec.y){dx=joyVec.x;dz=joyVec.y}moveUnit(player,dx,dz,dt);updateFollowers(dt);updateNpcs(dt);updateEnemies(dt);absorbChecks();updateCamera(dt);updateParticles(dt);updateUI();}
function updateFollowers(dt){const px=player.group.position.x,pz=player.group.position.z;followers.forEach((f,i)=>{const angle=i*.72;const dist=5+Math.sqrt(i)*1.8;const tx=px+Math.cos(angle+performance.now()/900)*dist,tz=pz+Math.sin(angle+performance.now()/900)*dist;const dx=tx-f.group.position.x,dz=tz-f.group.position.z;f.speed=24;moveUnit(f,dx,dz,dt)})}
function updateNpcs(dt){npcs.forEach(n=>{n.ai-=dt;if(n.ai<=0){n.ai=1+Math.random()*3;n.dir.set(Math.random()-.5,0,Math.random()-.5).normalize()}moveUnit(n,n.dir.x,n.dir.z,dt)})}
function updateEnemies(dt){enemies.forEach(e=>{if(e.dead)return;e.ai-=dt;let target=null,best=9999;[...npcs,player,...enemies.filter(x=>x!==e&&!x.dead)].forEach(t=>{if(t.team==='enemy'&&t.color===e.color)return;const d=e.group.position.distanceTo(t.group.position);if((t.team==='neutral'||e.power>t.power*1.08)&&d<best){best=d;target=t}});if(target&&best<60){const v=target.group.position.clone().sub(e.group.position);moveUnit(e,v.x,v.z,dt)}else{if(e.ai<=0){e.ai=1+Math.random()*2;e.dir.set(Math.random()-.5,0,Math.random()-.5).normalize()}moveUnit(e,e.dir.x,e.dir.z,dt)}updateEnemyVisual(e)})}
function absorbChecks(){const all=[...npcs];for(let i=all.length-1;i>=0;i--){const n=all[i];if(player.group.position.distanceTo(n.group.position)<levels[player.level].range){absorbNpc(player,n);npcs.splice(npcs.indexOf(n),1);continue}for(const e of enemies){if(!e.dead&&e.group.position.distanceTo(n.group.position)<levels[e.level].range*.75){absorbNpc(e,n);npcs.splice(npcs.indexOf(n),1);break}}}
 for(const e of enemies){if(e.dead)continue;const d=player.group.position.distanceTo(e.group.position);if(d<levels[player.level].range*.75+levels[e.level].range*.45){if(player.power>=e.power*1.08){defeatEnemy(e)}else if(e.power>=player.power*1.02){endGame('GAME OVER',`${e.label.userData.text.split('\n')[0]} 세력에게 패배했습니다.`)}}
 for(const other of enemies){if(e===other||other.dead)continue;const d2=e.group.position.distanceTo(other.group.position);if(d2<5&&e.power>other.power*1.12){e.power+=Math.floor(other.power*.75);other.dead=true;scene.remove(other.group)}}}
 enemies=enemies.filter(e=>!e.dead);while(npcs.length<190)spawnNpc();}
function absorbNpc(owner,n){scene.remove(n.group);owner.power+=levels[owner.level].mult;owner.collected++;owner.score=(owner.score||0)+levels[owner.level].mult;if(owner===player)state.score+=levels[owner.level].mult;spawnBurst(n.group.position,owner.color,10);if(owner===player){const f=createUnit(n.group.position.x,n.group.position.z,0,player.color,false);f.team='player';scene.add(f.group);followers.push(f);if(followers.length>55){scene.remove(followers.shift().group)}}checkEvolution(owner)}
function defeatEnemy(e){state.kills++;player.power+=Math.floor(e.power*.6);state.score+=e.power*10;spawnBurst(e.group.position,0xffd25b,35);scene.remove(e.group);e.dead=true;checkEvolution(player)}
function checkEvolution(u){while(u.collected>=levels[u.level].need&&u.level<levels.length-1){u.collected-=levels[u.level].need;u.level++;u.range=levels[u.level].range;u.color=levels[u.level].color;u.group.traverse(o=>{if(o.material&&o.type!=='Sprite'){if(o.material.color)o.material.color.setHex(u.color);}});u.group.scale.setScalar(levels[u.level].scale);if(u===player){followers.forEach(f=>scene.remove(f.group));followers=[];showToast(`${levels[u.level].name}`);spawnRing(u.group.position,u.color);}}}
function updateEnemyVisual(e){const txt=`${levels[e.level].name} | ${levels[e.level].tag}\n${levels[e.level].stars}  ${Math.floor(e.power).toLocaleString()}`;updateLabel(e.label,txt,e.color)}
function updateParticles(dt){particles=particles.filter(p=>{p.life-=dt;p.mesh.position.addScaledVector(p.vel,dt);p.mesh.material.opacity=Math.max(0,p.life/p.max);if(p.life<=0){scene.remove(p.mesh);return false}return true})}
function spawnBurst(pos,color,count){for(let i=0;i<count;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(.32,8,8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));m.position.copy(pos);m.position.y=2+Math.random()*5;scene.add(m);particles.push({mesh:m,vel:new THREE.Vector3((Math.random()-.5)*20,Math.random()*14,(Math.random()-.5)*20),life:.5+Math.random()*.45,max:.95})}}
function spawnRing(pos,color){const ring=new THREE.Mesh(new THREE.TorusGeometry(4,.22,8,120),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.7}));ring.rotation.x=Math.PI/2;ring.position.copy(pos);ring.position.y=.4;scene.add(ring);particles.push({mesh:ring,vel:new THREE.Vector3(0,0,0),life:1.1,max:1.1});let s=1;const id=setInterval(()=>{s+=.35;ring.scale.set(s,s,s);if(s>8)clearInterval(id)},30)}
function showToast(t){const el=$('#toast');el.textContent=t;el.classList.remove('show');void el.offsetWidth;el.classList.add('show')}
function updateCamera(dt){const p=player.group.position;const target=new THREE.Vector3(p.x,76,p.z+82);camera.position.lerp(target,1-Math.pow(.001,dt));camera.lookAt(p.x,0,p.z)}
function updateUI(){const l=levels[player.level];$('#levelName').textContent=l.name;$('#levelText').textContent=`${l.tag} ${l.stars}`;$('#powerText').textContent=Math.floor(player.power).toLocaleString();$('#rangeText').textContent=l.range+'m';$('#killText').textContent=state.kills;$('#scoreText').textContent=state.score.toLocaleString();$('#evoBar').style.width=Math.min(100,(player.collected/l.need)*100)+'%';$('#timerText').textContent=formatTime(state.time);updateLabel(player.label,`${l.name} | ${l.tag}\n${l.stars}  ${Math.floor(player.power).toLocaleString()}`,l.color);const ranks=[{name:l.name,p:player.power,c:'#6bf1ff'},...enemies.map(e=>({name:levels[e.level].name,p:e.power,c:'#fff'}))].sort((a,b)=>b.p-a.p).slice(0,5);$('#rankList').innerHTML=ranks.map((r,i)=>`<div class="rank-row"><span>${i+1}. ${r.name}</span><b>${Math.floor(r.p).toLocaleString()}</b></div>`).join('');drawMini()}
function drawMini(){const ctx=mini.getContext('2d'),w=mini.width=180,h=mini.height=180;ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(9,18,32,.9)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(255,255,255,.14)';for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(i*w/6,0);ctx.lineTo(i*w/6,h);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*h/6);ctx.lineTo(w,i*h/6);ctx.stroke()}const map=(v)=>((v/worldSize)+.5)*w;ctx.fillStyle='#777';obstacles.forEach(o=>{ctx.fillRect(map(o.x)-2,map(o.z)-2,4,4)});ctx.fillStyle='#ff4f55';enemies.forEach(e=>{ctx.beginPath();ctx.arc(map(e.group.position.x),map(e.group.position.z),3,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#2f8cff';ctx.beginPath();ctx.arc(map(player.group.position.x),map(player.group.position.z),4,0,Math.PI*2);ctx.fill()}
function formatTime(t){t=Math.max(0,Math.ceil(t));return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`}
function endGame(title,desc){if(state.over)return;state.over=true;$('#overTitle').textContent=title;$('#overDesc').textContent=`${desc} 최종 점수 ${state.score.toLocaleString()}, 도달 단계 ${levels[player.level].name}.`;$('#gameOver').classList.add('show')}
function render(){renderer.render(scene,camera)}
function resize(){if(!renderer)return;const w=game.clientWidth,h=game.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}
addEventListener('resize',resize);addEventListener('keydown',e=>{keys[e.code]=true});addEventListener('keyup',e=>{keys[e.code]=false});
let joyVec={x:0,y:0};const joy=$('#joy');function joySet(e){const r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;const p=e.touches?e.touches[0]:e;let x=(p.clientX-cx)/(r.width*.36),y=(p.clientY-cy)/(r.height*.36);const l=Math.hypot(x,y);if(l>1){x/=l;y/=l}joyVec={x,y}}joy.addEventListener('touchstart',joySet);joy.addEventListener('touchmove',joySet);joy.addEventListener('touchend',()=>joyVec={x:0,y:0});
</script>
</body>
